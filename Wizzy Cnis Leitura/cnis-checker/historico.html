<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historico CNIS Checker</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: #172033;
        background: #f4f7fb;
        font-family: Arial, Helvetica, sans-serif;
      }
      header {
        padding: 26px;
        color: #fff;
        background: #0f172a;
      }
      header h1 {
        margin: 0 0 6px;
        font-size: 26px;
      }
      header p {
        margin: 0;
        color: #cbd5e1;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 22px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 16px;
      }
      .filter-field {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 36px;
        padding: 0 10px;
        color: #334155;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 700;
      }
      .filter-field select {
        height: 28px;
        color: #172033;
        background: #f8fafc;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-weight: 700;
      }
      button {
        height: 36px;
        padding: 0 14px;
        color: #fff;
        background: #0891b2;
        border: 0;
        border-radius: 7px;
        cursor: pointer;
        font-weight: 700;
      }
      button.secondary {
        color: #334155;
        background: #e2e8f0;
      }
      button.danger {
        color: #fff;
        background: #e11d48;
      }
      .empty {
        padding: 18px;
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
      }
      .item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 14px;
        align-items: center;
        margin-bottom: 10px;
        padding: 14px;
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
      }
      .item h2 {
        margin: 0 0 5px;
        font-size: 17px;
      }
      .item p {
        margin: 0;
        color: #64748b;
        font-size: 13px;
      }
      .right-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        min-width: 118px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .right-badge.ok {
        color: #14532d;
        background: #dcfce7;
        border: 1px solid #86efac;
      }
      .right-badge.fail {
        color: #7f1d1d;
        background: #fee2e2;
        border: 1px solid #fca5a5;
      }
      .right-badge.unknown {
        color: #475569;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      iframe {
        display: none;
        width: 100%;
        height: 760px;
        margin: 0 0 18px;
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
      }
      iframe.open {
        display: block;
      }
      @media (max-width: 760px) {
        .toolbar,
        .actions {
          flex-wrap: wrap;
        }
        .item {
          grid-template-columns: 1fr;
        }
        .right-badge {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Historico CNIS Checker</h1>
      <p id="subtitle">Carregando relatorios...</p>
    </header>
    <main>
      <div class="toolbar">
        <button id="refreshBtn" type="button">Atualizar</button>
        <label class="filter-field" for="statusFilter">
          Status
          <select id="statusFilter">
            <option value="all">Todos</option>
            <option value="qualified">Qualificados</option>
            <option value="disqualified">Desqualificados</option>
          </select>
        </label>
        <button id="downloadAllBtn" type="button">Baixar todos</button>
        <button id="clearBtn" class="secondary" type="button">Limpar historico</button>
      </div>
      <section id="list"></section>
    </main>
    <script src="historico.js"></script>
  </body>
</html>
