name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/api/supabase/functions/**'
      - 'apps/api/supabase/config.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed Edge Functions
        working-directory: apps/api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "Project ref: $PROJECT_REF"
          echo "Deploying zapi-get-qrcode..."
          supabase functions deploy zapi-get-qrcode --project-ref $PROJECT_REF
          echo "Deploying zapi-configure-webhook..."
          supabase functions deploy zapi-configure-webhook --project-ref $PROJECT_REF
          echo "Deploying zapi-create-instance..."
          supabase functions deploy zapi-create-instance --project-ref $PROJECT_REF
          echo "Deploying zapi-save-credentials..."
          supabase functions deploy zapi-save-credentials --project-ref $PROJECT_REF
          echo "All deployments complete."
